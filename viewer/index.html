<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DXF 뷰어</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; font-family: 'Segoe UI', sans-serif; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    .topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; background: #12122a;
      border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0;
    }
    .topbar a { color: #7c6af7; text-decoration: none; font-size: 0.85rem; }
    .topbar h1 { font-size: 1rem; font-weight: 700; flex: 1; }
    .btn {
      padding: 7px 16px; border-radius: 8px; border: none; cursor: pointer;
      font-size: 0.82rem; font-weight: 600; transition: all 0.15s;
    }
    .btn-primary { background: #7c6af7; color: #fff; }
    .btn-primary:hover { background: #6a58e0; }
    .btn-ghost { background: rgba(255,255,255,0.07); color: #ccc; border: 1px solid rgba(255,255,255,0.12); }
    .btn-ghost:hover { background: rgba(255,255,255,0.13); }

    .main { display: flex; flex: 1; overflow: hidden; }

    .sidebar {
      width: 220px; background: #12122a; border-right: 1px solid rgba(255,255,255,0.08);
      display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto;
    }
    .sidebar-section { padding: 14px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .sidebar-section h3 { font-size: 0.72rem; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .layer-item {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 0; cursor: pointer; font-size: 0.82rem; color: #ccc;
    }
    .layer-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .layer-check { margin-left: auto; }
    .info-row { display: flex; justify-content: space-between; font-size: 0.78rem; padding: 3px 0; color: #aaa; }
    .info-row span:last-child { color: #ddd; }

    .canvas-wrap {
      flex: 1; position: relative; overflow: hidden; background: #0d0d1a;
      display: flex; align-items: center; justify-content: center;
    }
    canvas { position: absolute; top: 0; left: 0; cursor: grab; }
    canvas.grabbing { cursor: grabbing; }

    .drop-zone {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      pointer-events: none;
    }
    .drop-zone.hidden { display: none; }
    .drop-icon { font-size: 4rem; opacity: 0.3; }
    .drop-text { color: #555; font-size: 1rem; }
    .drop-sub { color: #444; font-size: 0.82rem; }

    .drop-overlay {
      position: absolute; inset: 0;
      background: rgba(124,106,247,0.12);
      border: 3px dashed #7c6af7;
      border-radius: 12px;
      display: none; align-items: center; justify-content: center;
      pointer-events: none; z-index: 10;
    }
    .drop-overlay.active { display: flex; }

    .zoom-controls {
      position: absolute; bottom: 16px; right: 16px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .zoom-btn {
      width: 34px; height: 34px; border-radius: 8px;
      background: rgba(20,20,50,0.9); border: 1px solid rgba(255,255,255,0.1);
      color: #fff; font-size: 1.1rem; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
    }
    .zoom-btn:hover { background: rgba(124,106,247,0.4); }

    .statusbar {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(18,18,42,0.85); padding: 4px 12px;
      font-size: 0.72rem; color: #666; display: flex; gap: 16px;
    }
  </style>
</head>
<body>

<div class="topbar">
  <a href="../index.html">← 홈</a>
  <h1>🖼️ DXF 뷰어</h1>
  <input type="file" id="fileInput" accept=".dxf" style="display:none">
  <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">파일 열기</button>
  <button class="btn btn-ghost" onclick="fitView()">화면 맞춤</button>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-section">
      <h3>파일 정보</h3>
      <div id="fileInfo">
        <div class="info-row"><span>파일명</span><span id="infoName">-</span></div>
        <div class="info-row"><span>엔티티</span><span id="infoEntities">-</span></div>
        <div class="info-row"><span>레이어</span><span id="infoLayers">-</span></div>
      </div>
    </div>
    <div class="sidebar-section" style="flex:1">
      <h3>레이어</h3>
      <div id="layerList"></div>
    </div>
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="canvas"></canvas>

    <div class="drop-zone" id="dropZone">
      <div class="drop-icon">📐</div>
      <div class="drop-text">DXF 파일을 여기에 드롭하세요</div>
      <div class="drop-sub">또는 상단 "파일 열기" 버튼 클릭</div>
    </div>

    <div class="drop-overlay" id="dropOverlay">
      <div style="color:#7c6af7; font-size:1.2rem; font-weight:700;">파일을 놓으세요</div>
    </div>

    <div class="zoom-controls">
      <button class="zoom-btn" onclick="zoom(1.3)">+</button>
      <button class="zoom-btn" onclick="zoom(0.77)">−</button>
      <button class="zoom-btn" onclick="fitView()" title="화면 맞춤">⊡</button>
    </div>

    <div class="statusbar">
      <span id="statusZoom">확대: 100%</span>
      <span id="statusCoord">X: 0 Y: 0</span>
      <span id="statusEntities"></span>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');

let entities = [];
let layers = {};
let layerVisible = {};
let bounds = { minX: 0, maxX: 100, minY: 0, maxY: 100 };

let scale = 1, offsetX = 0, offsetY = 0;
let isPanning = false, panStart = { x: 0, y: 0 };

function resizeCanvas() {
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  render();
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ─── DXF 파서 ─────────────────────────────────────────────────────────────
function parseDXF(text) {
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  const result = { entities: [], layers: {} };
  let i = 0;

  function next() {
    while (i < lines.length) {
      const code = lines[i++]?.trim();
      const val = lines[i++]?.trim();
      if (code !== undefined && val !== undefined) return { code: parseInt(code), val };
    }
    return null;
  }

  function readEntity(type) {
    const e = { type, layer: '0' };
    const pts = [];
    while (i < lines.length) {
      const saved = i;
      const pair = next();
      if (!pair) break;
      const { code, val } = pair;
      if (code === 0) { i = saved; break; }
      if (code === 8) e.layer = val;
      else if (code === 62) e.colorIndex = parseInt(val);
      else if (code === 10) pts.push({ x: parseFloat(val), y: 0 });
      else if (code === 20) { if (pts.length) pts[pts.length - 1].y = parseFloat(val); }
      else if (code === 11) e.x2 = parseFloat(val);
      else if (code === 21) e.y2 = parseFloat(val);
      else if (code === 40) e.r = parseFloat(val);
      else if (code === 50) e.startAngle = parseFloat(val);
      else if (code === 51) e.endAngle = parseFloat(val);
      else if (code === 70) e.flags = parseInt(val);
      else if (code === 1) e.text = val;
      else if (code === 39) e.thickness = parseFloat(val);
      else if (code === 41) e.xScale = parseFloat(val);
      else if (code === 42) e.bulge = parseFloat(val);
      else if (code === 43) e.width = parseFloat(val);
    }
    if (pts.length) {
      e.x = pts[0].x; e.y = pts[0].y;
      if (pts.length > 1) e.pts = pts;
    }
    return e;
  }

  function readLayer() {
    const layer = { name: '', color: 7 };
    while (i < lines.length) {
      const saved = i;
      const pair = next();
      if (!pair) break;
      const { code, val } = pair;
      if (code === 0) { i = saved; break; }
      if (code === 2) layer.name = val;
      if (code === 62) layer.color = Math.abs(parseInt(val));
    }
    return layer;
  }

  let section = '', inEntities = false, inTables = false;

  while (i < lines.length) {
    const pair = next();
    if (!pair) break;
    const { code, val } = pair;

    if (code === 0) {
      if (val === 'SECTION') {
        const sp = next();
        if (sp?.val === 'ENTITIES') inEntities = true;
        else if (sp?.val === 'TABLES') inTables = true;
        else { inEntities = false; inTables = false; }
      } else if (val === 'ENDSEC') {
        inEntities = false; inTables = false;
      } else if (val === 'LAYER' && inTables) {
        const layer = readLayer();
        if (layer.name) result.layers[layer.name] = layer;
      } else if (inEntities) {
        const types = ['LINE','CIRCLE','ARC','LWPOLYLINE','POLYLINE','SPLINE','TEXT','MTEXT','ELLIPSE','POINT'];
        if (types.includes(val)) {
          const e = readEntity(val);
          result.entities.push(e);
        }
      }
    }
  }
  return result;
}

// ─── DXF 색상 ──────────────────────────────────────────────────────────────
const DXF_COLORS = [
  '#000000','#FF0000','#FFFF00','#00FF00','#00FFFF','#0000FF','#FF00FF','#FFFFFF',
  '#414141','#808080','#FF0000','#FF7F7F','#CC0000','#CC6666','#990000','#994C4C',
  '#7F0000','#7F3F3F','#4C0000','#4C2626','#FF3F00','#FF9F7F','#CC3300','#CC7A66',
  '#992600','#995C4C','#7F1F00','#7F4C3F','#4C1300','#4C2D26','#FF7F00','#FFBF7F',
  '#CC6600','#CC9966','#994C00','#997A4C','#7F3F00','#7F5F3F','#4C2600','#4C3926',
  '#FFBF00','#FFDF7F','#CC9900','#CCB266','#997200','#997F4C','#7F5F00','#7F6C3F',
  '#4C3900','#4C4026','#FFFF00','#FFFF7F','#CCCC00','#CCCC66','#999900','#99994C',
  '#7F7F00','#7F7F3F','#4C4C00','#4C4C26','#BFFF00','#DFFF7F','#99CC00','#B2CC66',
  '#729900','#7F994C','#5F7F00','#6C7F3F','#394C00','#404C26','#7FFF00','#BFFF7F',
  '#66CC00','#99CC66','#4C9900','#66994C','#3F7F00','#4C7F3F','#264C00','#2D4C26',
  '#3FFF00','#9FFF7F','#33CC00','#7FCC66','#269900','#4C994C','#1F7F00','#3F7F3F',
  '#134C00','#264C26','#00FF00','#7FFF7F','#00CC00','#66CC66','#009900','#4C994C',
  '#007F00','#3F7F3F','#004C00','#264C26','#00FF3F','#7FFF9F','#00CC33','#66CC7F',
  '#009926','#4C9966','#007F1F','#3F7F4C','#004C13','#264C2D','#00FF7F','#7FFFBF',
  '#00CC66','#66CC99','#00994C','#4C9972','#007F3F','#3F7F5F','#004C26','#264C39',
  '#00FFBF','#7FFFDF','#00CC99','#66CCB2','#009972','#4C997F','#007F5F','#3F7F6C',
  '#004C39','#264C46','#00FFFF','#7FFFFF','#00CCCC','#66CCCC','#009999','#4C9999',
  '#007F7F','#3F7F7F','#004C4C','#264C4C','#00BFFF','#7FDFFF','#0099CC','#66B2CC',
  '#007299','#4C7F99','#005F7F','#3F6C7F','#00394C','#26404C','#007FFF','#7FBFFF',
  '#0066CC','#6699CC','#004C99','#4C6699','#003F7F','#3F4C7F','#00264C','#262D4C',
  '#003FFF','#7F9FFF','#0033CC','#667FCC','#002699','#4C5299','#001F7F','#3F3F7F',
  '#00134C','#26264C','#0000FF','#7F7FFF','#0000CC','#6666CC','#000099','#4C4C99',
  '#00007F','#3F3F7F','#00004C','#26264C','#3F00FF','#9F7FFF','#3300CC','#7F66CC',
  '#260099','#524C99','#1F007F','#3F3F7F','#13004C','#2D264C','#7F00FF','#BF7FFF',
  '#6600CC','#9966CC','#4C0099','#664C99','#3F007F','#4C3F7F','#26004C','#392640',
  '#BF00FF','#DF7FFF','#9900CC','#B266CC','#720099','#7F4C99','#5F007F','#6C3F7F',
  '#39004C','#46264C','#FF00FF','#FF7FFF','#CC00CC','#CC66CC','#990099','#994C99',
  '#7F007F','#7F3F7F','#4C004C','#4C264C','#FF00BF','#FF7FDF','#CC0099','#CC66B2',
  '#990072','#99266C','#7F005F','#7F3F6C','#4C0039','#4C2646','#FF007F','#FF7FBF',
  '#CC0066','#CC6699','#99004C','#994C66','#7F003F','#7F3F4C','#4C0026','#4C2633',
  '#FF003F','#FF7F9F','#CC0033','#CC667F','#990026','#99264C','#7F001F','#7F3F3F',
  '#4C0013','#4C2626','#333333','#505050','#696969','#828282','#BEBEBE','#D2D2D2',
  '#E6E6E6','#FFFFFF'
];

function dxfColor(idx, layerColor) {
  const c = idx ?? layerColor ?? 7;
  if (c === 7) return '#EEEEEE';
  return DXF_COLORS[c] || '#EEEEEE';
}

// ─── 렌더링 ────────────────────────────────────────────────────────────────
function toScreen(wx, wy) {
  return {
    x: (wx - bounds.minX) * scale + offsetX,
    y: canvas.height - ((wy - bounds.minY) * scale + offsetY)
  };
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (!entities.length) return;

  entities.forEach(e => {
    if (!layerVisible[e.layer]) return;
    const layerDef = layers[e.layer] || {};
    const color = dxfColor(e.colorIndex, layerDef.color);

    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = Math.max(0.5, scale * 0.3);
    ctx.beginPath();

    if (e.type === 'LINE') {
      const a = toScreen(e.x, e.y), b = toScreen(e.x2, e.y2);
      ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();

    } else if (e.type === 'CIRCLE') {
      const c = toScreen(e.x, e.y);
      ctx.arc(c.x, c.y, e.r * scale, 0, Math.PI * 2); ctx.stroke();

    } else if (e.type === 'ARC') {
      const c = toScreen(e.x, e.y);
      const sa = -(e.startAngle * Math.PI / 180);
      const ea = -(e.endAngle * Math.PI / 180);
      ctx.arc(c.x, c.y, e.r * scale, sa, ea, true); ctx.stroke();

    } else if (e.type === 'POINT') {
      const p = toScreen(e.x, e.y);
      ctx.arc(p.x, p.y, 2, 0, Math.PI * 2); ctx.fill();

    } else if ((e.type === 'LWPOLYLINE' || e.type === 'POLYLINE') && e.pts) {
      if (e.pts.length < 2) return;
      const p0 = toScreen(e.pts[0].x, e.pts[0].y);
      ctx.moveTo(p0.x, p0.y);
      for (let j = 1; j < e.pts.length; j++) {
        const p = toScreen(e.pts[j].x, e.pts[j].y);
        ctx.lineTo(p.x, p.y);
      }
      if (e.flags & 1) ctx.closePath();
      ctx.stroke();

    } else if (e.type === 'SPLINE' && e.pts) {
      if (e.pts.length < 2) return;
      const p0 = toScreen(e.pts[0].x, e.pts[0].y);
      ctx.moveTo(p0.x, p0.y);
      for (let j = 1; j < e.pts.length; j++) {
        const p = toScreen(e.pts[j].x, e.pts[j].y);
        ctx.lineTo(p.x, p.y);
      }
      ctx.stroke();

    } else if (e.type === 'ELLIPSE') {
      const c = toScreen(e.x, e.y);
      const rx = e.r * scale;
      const ry = rx * (e.xScale || 1);
      ctx.ellipse(c.x, c.y, rx, ry, 0, 0, Math.PI * 2); ctx.stroke();

    } else if (e.type === 'TEXT' || e.type === 'MTEXT') {
      const p = toScreen(e.x, e.y);
      const fs = Math.max(8, (e.r || 2.5) * scale);
      ctx.font = `${fs}px Consolas, monospace`;
      ctx.fillStyle = color;
      ctx.fillText(e.text || '', p.x, p.y);
    }
  });
}

// ─── 경계 계산 ─────────────────────────────────────────────────────────────
function calcBounds(ents) {
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  function upd(x, y) {
    if (x < minX) minX = x; if (x > maxX) maxX = x;
    if (y < minY) minY = y; if (y > maxY) maxY = y;
  }
  ents.forEach(e => {
    if (e.x != null) upd(e.x, e.y);
    if (e.x2 != null) upd(e.x2, e.y2);
    if (e.r) { upd(e.x + e.r, e.y + e.r); upd(e.x - e.r, e.y - e.r); }
    if (e.pts) e.pts.forEach(p => upd(p.x, p.y));
  });
  if (!isFinite(minX)) { minX = 0; maxX = 100; minY = 0; maxY = 100; }
  return { minX, maxX, minY, maxY };
}

function fitView() {
  if (!entities.length) return;
  const w = canvas.width, h = canvas.height;
  const bw = bounds.maxX - bounds.minX || 1;
  const bh = bounds.maxY - bounds.minY || 1;
  const pad = 0.9;
  scale = Math.min(w / bw, h / bh) * pad;
  offsetX = (w - bw * scale) / 2;
  offsetY = (h - bh * scale) / 2;
  render();
  updateStatus();
}

// ─── 파일 로드 ─────────────────────────────────────────────────────────────
function loadDXF(text, name) {
  const parsed = parseDXF(text);
  entities = parsed.entities;
  layers = parsed.layers;

  if (!Object.keys(layers).length) {
    const seen = [...new Set(entities.map(e => e.layer))];
    seen.forEach(l => { layers[l] = { name: l, color: 7 }; });
  }

  layerVisible = {};
  Object.keys(layers).forEach(l => layerVisible[l] = true);
  entities.forEach(e => { if (!(e.layer in layerVisible)) layerVisible[e.layer] = true; });

  bounds = calcBounds(entities);

  document.getElementById('dropZone').classList.add('hidden');
  document.getElementById('infoName').textContent = name;
  document.getElementById('infoEntities').textContent = entities.length;
  document.getElementById('infoLayers').textContent = Object.keys(layers).length;

  buildLayerList();
  fitView();
}

function buildLayerList() {
  const list = document.getElementById('layerList');
  list.innerHTML = '';
  const COLORS = Object.entries(layers).map(([name, l]) => ({
    name, color: dxfColor(null, l.color)
  }));
  const layerNames = [...new Set(entities.map(e => e.layer))];
  layerNames.forEach(name => {
    const def = layers[name] || { color: 7 };
    const color = dxfColor(null, def.color);
    const div = document.createElement('div');
    div.className = 'layer-item';
    div.innerHTML = `
      <div class="layer-dot" style="background:${color}"></div>
      <span>${name || '기본'}</span>
      <input type="checkbox" class="layer-check" checked>
    `;
    div.querySelector('input').addEventListener('change', ev => {
      layerVisible[name] = ev.target.checked;
      render();
    });
    list.appendChild(div);
  });
}

// ─── 파일 입력 ─────────────────────────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', ev => {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => loadDXF(e.target.result, file.name);
  reader.readAsText(file, 'utf-8');
});

const canvasWrap = document.getElementById('canvasWrap');
canvasWrap.addEventListener('dragover', e => { e.preventDefault(); document.getElementById('dropOverlay').classList.add('active'); });
canvasWrap.addEventListener('dragleave', () => document.getElementById('dropOverlay').classList.remove('active'));
canvasWrap.addEventListener('drop', e => {
  e.preventDefault();
  document.getElementById('dropOverlay').classList.remove('active');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => loadDXF(ev.target.result, file.name);
  reader.readAsText(file, 'utf-8');
});

// ─── 마우스 조작 ───────────────────────────────────────────────────────────
canvas.addEventListener('mousedown', e => {
  isPanning = true;
  panStart = { x: e.clientX - offsetX, y: e.clientY - offsetY };
  canvas.classList.add('grabbing');
});
window.addEventListener('mouseup', () => { isPanning = false; canvas.classList.remove('grabbing'); });
window.addEventListener('mousemove', e => {
  if (isPanning) {
    offsetX = e.clientX - panStart.x;
    offsetY = e.clientY - panStart.y;
    render(); updateStatus();
  }
  const rect = canvas.getBoundingClientRect();
  const wx = (e.clientX - rect.left - offsetX) / scale + bounds.minX;
  const wy = (canvas.height - (e.clientY - rect.top) - offsetY) / scale + bounds.minY;
  document.getElementById('statusCoord').textContent = `X: ${wx.toFixed(2)}  Y: ${wy.toFixed(2)}`;
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.15 : 0.87;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  offsetX = mx - (mx - offsetX) * factor;
  offsetY = my - (my - offsetY) * factor;
  scale *= factor;
  render(); updateStatus();
}, { passive: false });

function zoom(f) {
  offsetX = canvas.width / 2 - (canvas.width / 2 - offsetX) * f;
  offsetY = canvas.height / 2 - (canvas.height / 2 - offsetY) * f;
  scale *= f;
  render(); updateStatus();
}

function updateStatus() {
  document.getElementById('statusZoom').textContent = `확대: ${(scale * 100).toFixed(0)}%`;
  document.getElementById('statusEntities').textContent = entities.length ? `엔티티 ${entities.length}개` : '';
}
</script>
</body>
</html>
