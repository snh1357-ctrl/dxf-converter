<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DXF 도구 모음</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }
    header { text-align: center; margin-bottom: 60px; }
    header h1 { font-size: 2.8rem; font-weight: 800; letter-spacing: -1px; }
    header h1 span { color: #7c6af7; }
    header p { color: #aaa; margin-top: 10px; font-size: 1rem; }
    .cards {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 20px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 48px 40px;
      width: 300px;
      text-align: center;
      text-decoration: none;
      color: #fff;
      transition: transform 0.2s, background 0.2s, border-color 0.2s;
      cursor: pointer;
    }
    .card:hover {
      transform: translateY(-8px);
      background: rgba(124,106,247,0.15);
      border-color: #7c6af7;
    }
    .card .icon {
      font-size: 3.5rem;
      margin-bottom: 20px;
      display: block;
    }
    .card h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 12px; }
    .card p { color: #aaa; font-size: 0.9rem; line-height: 1.6; }
    .badge {
      display: inline-block;
      margin-top: 20px;
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 600;
      background: rgba(124,106,247,0.2);
      color: #a89af7;
      border: 1px solid rgba(124,106,247,0.3);
    }
    footer { margin-top: 60px; color: #555; font-size: 0.8rem; }
  </style>
</head>
<body>
  <header>
    <h1>DXF <span>도구 모음</span></h1>
    <p>DXF 파일을 브라우저에서 바로 열고, 변환하세요</p>
  </header>

  <div class="cards">
    <a class="card" href="viewer/index.html">
      <span class="icon">🖼️</span>
      <h2>DXF 뷰어</h2>
      <p>DXF 파일을 브라우저에서 바로 열어 확인하세요. 확대/축소, 이동, 레이어 조절을 지원합니다.</p>
      <span class="badge">미리보기 · 확대/축소 · 레이어</span>
    </a>

    <a class="card" href="converter/index.html">
      <span class="icon">⚙️</span>
      <h2>DXF 변환기</h2>
      <p>DXF 파일을 SVG 또는 PNG 형식으로 변환하여 다운로드할 수 있습니다.</p>
      <span class="badge">→ SVG · → PNG</span>
    </a>
  </div>

  <footer>DXF 도구 모음 &nbsp;|&nbsp; 브라우저 기반 · 서버 없이 동작</footer>
</body>
</html>
