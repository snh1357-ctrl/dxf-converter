<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DXF 변환기</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; font-family: 'Segoe UI', sans-serif; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }

    .topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; background: #12122a;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .topbar a { color: #7c6af7; text-decoration: none; font-size: 0.85rem; }
    .topbar h1 { font-size: 1rem; font-weight: 700; }

    .content { flex: 1; display: flex; gap: 0; }

    .panel {
      flex: 1; padding: 32px;
      display: flex; flex-direction: column; gap: 24px;
      max-width: 480px;
    }

    .upload-area {
      border: 2px dashed rgba(124,106,247,0.4);
      border-radius: 16px; padding: 48px 24px;
      text-align: center; cursor: pointer;
      transition: all 0.2s; background: rgba(124,106,247,0.04);
    }
    .upload-area:hover, .upload-area.drag { border-color: #7c6af7; background: rgba(124,106,247,0.1); }
    .upload-area .icon { font-size: 3rem; margin-bottom: 12px; }
    .upload-area p { color: #aaa; font-size: 0.9rem; }
    .upload-area strong { color: #fff; display: block; margin-bottom: 6px; font-size: 1rem; }

    .section-title { font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }

    .format-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .format-card {
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: 12px; padding: 16px;
      cursor: pointer; transition: all 0.15s; text-align: center;
      background: rgba(255,255,255,0.03);
    }
    .format-card:hover { border-color: rgba(124,106,247,0.5); background: rgba(124,106,247,0.08); }
    .format-card.selected { border-color: #7c6af7; background: rgba(124,106,247,0.15); }
    .format-card .fmt { font-size: 1.3rem; font-weight: 800; color: #7c6af7; }
    .format-card .desc { font-size: 0.75rem; color: #888; margin-top: 4px; }

    .file-info {
      background: rgba(255,255,255,0.04); border-radius: 12px; padding: 16px;
      display: none;
    }
    .file-info.show { display: block; }
    .info-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.82rem; }
    .info-row span:first-child { color: #888; }

    .btn-convert {
      padding: 14px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, #7c6af7, #a78cf7);
      color: #fff; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: all 0.15s; width: 100%;
    }
    .btn-convert:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,106,247,0.35); }
    .btn-convert:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .preview-panel {
      flex: 1; background: #0d0d1a;
      border-left: 1px solid rgba(255,255,255,0.07);
      position: relative; display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    canvas { max-width: 100%; max-height: 100%; }
    .preview-empty { color: #333; text-align: center; }
    .preview-empty .ico { font-size: 3rem; margin-bottom: 12px; }

    .result-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(18,18,42,0.95); padding: 12px 20px;
      display: flex; align-items: center; gap: 12px;
      border-top: 1px solid rgba(255,255,255,0.07);
      display: none;
    }
    .result-bar.show { display: flex; }
    .btn-dl {
      padding: 8px 20px; border-radius: 8px; border: none;
      background: #7c6af7; color: #fff; font-weight: 700;
      cursor: pointer; font-size: 0.85rem;
    }
    .btn-dl:hover { background: #6a58e0; }
    .result-info { font-size: 0.82rem; color: #aaa; flex: 1; }

    .progress { display: none; align-items: center; gap: 10px; padding: 12px 16px; background: rgba(124,106,247,0.1); border-radius: 10px; }
    .progress.show { display: flex; }
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(124,106,247,0.3); border-top-color: #7c6af7; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="topbar">
  <a href="../index.html">← 홈</a>
  <h1>⚙️ DXF 변환기</h1>
</div>

<div class="content">
  <div class="panel">
    <div>
      <div class="section-title">DXF 파일 선택</div>
      <input type="file" id="fileInput" accept=".dxf" style="display:none">
      <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
        <div class="icon">📂</div>
        <strong>DXF 파일을 선택하세요</strong>
        <p>클릭하거나 파일을 드래그하세요</p>
      </div>
    </div>

    <div class="file-info" id="fileInfo">
      <div class="section-title" style="margin-bottom:10px">파일 정보</div>
      <div class="info-row"><span>파일명</span><span id="infoName">-</span></div>
      <div class="info-row"><span>엔티티</span><span id="infoEntities">-</span></div>
      <div class="info-row"><span>레이어</span><span id="infoLayers">-</span></div>
      <div class="info-row"><span>크기</span><span id="infoSize">-</span></div>
    </div>

    <div>
      <div class="section-title">변환 형식</div>
      <div class="format-grid">
        <div class="format-card selected" data-fmt="svg" onclick="selectFmt('svg')">
          <div class="fmt">SVG</div>
          <div class="desc">벡터 이미지<br>확대해도 선명</div>
        </div>
        <div class="format-card" data-fmt="png" onclick="selectFmt('png')">
          <div class="fmt">PNG</div>
          <div class="desc">고해상도 이미지<br>2048×2048px</div>
        </div>
      </div>
    </div>

    <div class="progress" id="progress">
      <div class="spinner"></div>
      <span style="font-size:0.85rem;color:#aaa">변환 중...</span>
    </div>

    <button class="btn-convert" id="convertBtn" onclick="convert()" disabled>변환하기</button>
  </div>

  <div class="preview-panel" id="previewPanel">
    <div class="preview-empty" id="previewEmpty">
      <div class="ico">📐</div>
      <div style="color:#444;font-size:0.9rem">DXF 파일을 선택하면<br>미리보기가 표시됩니다</div>
    </div>
    <canvas id="previewCanvas" style="display:none"></canvas>

    <div class="result-bar" id="resultBar">
      <span class="result-info" id="resultInfo"></span>
      <button class="btn-dl" id="dlBtn">다운로드</button>
    </div>
  </div>
</div>

<script>
let selectedFmt = 'svg';
let parsedData = null;
let currentFileName = '';
let convertedBlob = null;
let convertedExt = '';

function selectFmt(fmt) {
  selectedFmt = fmt;
  document.querySelectorAll('.format-card').forEach(c => {
    c.classList.toggle('selected', c.dataset.fmt === fmt);
  });
}

// ─── DXF 파서 (뷰어와 동일) ────────────────────────────────────────────────
function parseDXF(text) {
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  const result = { entities: [], layers: {} };
  let i = 0;

  function next() {
    while (i < lines.length) {
      const code = lines[i++]?.trim();
      const val = lines[i++]?.trim();
      if (code !== undefined && val !== undefined) return { code: parseInt(code), val };
    }
    return null;
  }

  function readEntity(type) {
    const e = { type, layer: '0' };
    const pts = [];
    while (i < lines.length) {
      const saved = i;
      const pair = next();
      if (!pair) break;
      const { code, val } = pair;
      if (code === 0) { i = saved; break; }
      if (code === 8) e.layer = val;
      else if (code === 62) e.colorIndex = parseInt(val);
      else if (code === 10) pts.push({ x: parseFloat(val), y: 0 });
      else if (code === 20) { if (pts.length) pts[pts.length - 1].y = parseFloat(val); }
      else if (code === 11) e.x2 = parseFloat(val);
      else if (code === 21) e.y2 = parseFloat(val);
      else if (code === 40) e.r = parseFloat(val);
      else if (code === 50) e.startAngle = parseFloat(val);
      else if (code === 51) e.endAngle = parseFloat(val);
      else if (code === 70) e.flags = parseInt(val);
      else if (code === 1) e.text = val;
      else if (code === 41) e.xScale = parseFloat(val);
    }
    if (pts.length) {
      e.x = pts[0].x; e.y = pts[0].y;
      if (pts.length > 1) e.pts = pts;
    }
    return e;
  }

  function readLayer() {
    const layer = { name: '', color: 7 };
    while (i < lines.length) {
      const saved = i;
      const pair = next();
      if (!pair) break;
      const { code, val } = pair;
      if (code === 0) { i = saved; break; }
      if (code === 2) layer.name = val;
      if (code === 62) layer.color = Math.abs(parseInt(val));
    }
    return layer;
  }

  let inEntities = false, inTables = false;
  while (i < lines.length) {
    const pair = next();
    if (!pair) break;
    const { code, val } = pair;
    if (code === 0) {
      if (val === 'SECTION') {
        const sp = next();
        if (sp?.val === 'ENTITIES') inEntities = true;
        else if (sp?.val === 'TABLES') inTables = true;
        else { inEntities = false; inTables = false; }
      } else if (val === 'ENDSEC') { inEntities = false; inTables = false; }
      else if (val === 'LAYER' && inTables) {
        const layer = readLayer();
        if (layer.name) result.layers[layer.name] = layer;
      } else if (inEntities) {
        const types = ['LINE','CIRCLE','ARC','LWPOLYLINE','POLYLINE','SPLINE','TEXT','MTEXT','ELLIPSE','POINT'];
        if (types.includes(val)) result.entities.push(readEntity(val));
      }
    }
  }
  return result;
}

const DXF_COLORS = [
  '#000000','#FF0000','#FFFF00','#00FF00','#00FFFF','#0000FF','#FF00FF','#FFFFFF',
  '#414141','#808080','#FF0000','#FF7F7F','#CC0000','#CC6666','#990000','#994C4C',
  '#7F0000','#7F3F3F','#4C0000','#4C2626','#FF3F00','#FF9F7F','#CC3300','#CC7A66',
  '#992600','#995C4C','#7F1F00','#7F4C3F','#4C1300','#4C2D26','#FF7F00','#FFBF7F',
  '#CC6600','#CC9966','#994C00','#997A4C','#7F3F00','#7F5F3F','#4C2600','#4C3926',
  '#FFBF00','#FFDF7F','#CC9900','#CCB266','#997200','#997F4C','#7F5F00','#7F6C3F',
  '#4C3900','#4C4026','#FFFF00','#FFFF7F','#CCCC00','#CCCC66','#999900','#99994C',
  '#7F7F00','#7F7F3F','#4C4C00','#4C4C26','#BFFF00','#DFFF7F','#99CC00','#B2CC66',
  '#729900','#7F994C','#5F7F00','#6C7F3F','#394C00','#404C26','#7FFF00','#BFFF7F',
  '#66CC00','#99CC66','#4C9900','#66994C','#3F7F00','#4C7F3F','#264C00','#2D4C26',
  '#3FFF00','#9FFF7F','#33CC00','#7FCC66','#269900','#4C994C','#1F7F00','#3F7F3F',
  '#134C00','#264C26','#00FF00','#7FFF7F','#00CC00','#66CC66','#009900','#4C994C',
  '#007F00','#3F7F3F','#004C00','#264C26','#00FF3F','#7FFF9F','#00CC33','#66CC7F',
  '#009926','#4C9966','#007F1F','#3F7F4C','#004C13','#264C2D','#00FF7F','#7FFFBF',
  '#00CC66','#66CC99','#00994C','#4C9972','#007F3F','#3F7F5F','#004C26','#264C39',
  '#00FFBF','#7FFFDF','#00CC99','#66CCB2','#009972','#4C997F','#007F5F','#3F7F6C',
  '#004C39','#264C46','#00FFFF','#7FFFFF','#00CCCC','#66CCCC','#009999','#4C9999',
  '#007F7F','#3F7F7F','#004C4C','#264C4C','#00BFFF','#7FDFFF','#0099CC','#66B2CC',
  '#007299','#4C7F99','#005F7F','#3F6C7F','#00394C','#26404C','#007FFF','#7FBFFF',
  '#0066CC','#6699CC','#004C99','#4C6699','#003F7F','#3F4C7F','#00264C','#262D4C',
  '#003FFF','#7F9FFF','#0033CC','#667FCC','#002699','#4C5299','#001F7F','#3F3F7F',
  '#00134C','#26264C','#0000FF','#7F7FFF','#0000CC','#6666CC','#000099','#4C4C99',
  '#00007F','#3F3F7F','#00004C','#26264C','#3F00FF','#9F7FFF','#3300CC','#7F66CC',
  '#260099','#524C99','#1F007F','#3F3F7F','#13004C','#2D264C','#7F00FF','#BF7FFF',
  '#6600CC','#9966CC','#4C0099','#664C99','#3F007F','#4C3F7F','#26004C','#392640',
  '#BF00FF','#DF7FFF','#9900CC','#B266CC','#720099','#7F4C99','#5F007F','#6C3F7F',
  '#39004C','#46264C','#FF00FF','#FF7FFF','#CC00CC','#CC66CC','#990099','#994C99',
  '#7F007F','#7F3F7F','#4C004C','#4C264C','#FF00BF','#FF7FDF','#CC0099','#CC66B2',
  '#990072','#99266C','#7F005F','#7F3F6C','#4C0039','#4C2646','#FF007F','#FF7FBF',
  '#CC0066','#CC6699','#99004C','#994C66','#7F003F','#7F3F4C','#4C0026','#4C2633',
  '#FF003F','#FF7F9F','#CC0033','#CC667F','#990026','#99264C','#7F001F','#7F3F3F',
  '#4C0013','#4C2626','#333333','#505050','#696969','#828282','#BEBEBE','#D2D2D2',
  '#E6E6E6','#FFFFFF'
];

function dxfColor(idx, layerColor) {
  const c = idx ?? layerColor ?? 7;
  if (c === 7) return '#111111';
  return DXF_COLORS[c] || '#111111';
}

function calcBounds(ents) {
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  function upd(x, y) {
    if (x < minX) minX = x; if (x > maxX) maxX = x;
    if (y < minY) minY = y; if (y > maxY) maxY = y;
  }
  ents.forEach(e => {
    if (e.x != null) upd(e.x, e.y);
    if (e.x2 != null) upd(e.x2, e.y2);
    if (e.r) { upd(e.x + e.r, e.y + e.r); upd(e.x - e.r, e.y - e.r); }
    if (e.pts) e.pts.forEach(p => upd(p.x, p.y));
  });
  if (!isFinite(minX)) { minX = 0; maxX = 100; minY = 0; maxY = 100; }
  return { minX, maxX, minY, maxY };
}

// ─── 파일 처리 ─────────────────────────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', ev => {
  const file = ev.target.files[0];
  if (!file) return;
  loadFile(file);
});

const uploadArea = document.getElementById('uploadArea');
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault(); uploadArea.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});

function loadFile(file) {
  currentFileName = file.name.replace(/\.dxf$/i, '');
  const reader = new FileReader();
  reader.onload = e => {
    parsedData = parseDXF(e.target.result);
    const layerCount = Object.keys(parsedData.layers).length ||
      [...new Set(parsedData.entities.map(e => e.layer))].length;
    document.getElementById('infoName').textContent = file.name;
    document.getElementById('infoEntities').textContent = parsedData.entities.length;
    document.getElementById('infoLayers').textContent = layerCount;
    document.getElementById('infoSize').textContent = (file.size / 1024).toFixed(1) + ' KB';
    document.getElementById('fileInfo').classList.add('show');
    document.getElementById('convertBtn').disabled = false;
    drawPreview(parsedData, false);
    document.getElementById('resultBar').classList.remove('show');
  };
  reader.readAsText(file, 'utf-8');
}

// ─── 미리보기 렌더 ─────────────────────────────────────────────────────────
function drawOnCanvas(canvas, data, bgColor, fgDark) {
  const entities = data.entities;
  const layers = data.layers;
  const bounds = calcBounds(entities);
  const W = canvas.width, H = canvas.height;
  const ctx = canvas.getContext('2d');
  const bw = bounds.maxX - bounds.minX || 1;
  const bh = bounds.maxY - bounds.minY || 1;
  const pad = 0.9;
  const scale = Math.min(W / bw, H / bh) * pad;
  const offsetX = (W - bw * scale) / 2;
  const offsetY = (H - bh * scale) / 2;

  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, W, H);

  function toScreen(wx, wy) {
    return { x: (wx - bounds.minX) * scale + offsetX, y: H - ((wy - bounds.minY) * scale + offsetY) };
  }

  entities.forEach(e => {
    const layerDef = layers[e.layer] || {};
    let color = dxfColor(e.colorIndex, layerDef.color);
    if (fgDark && color === '#111111') color = '#111111';
    ctx.strokeStyle = color; ctx.fillStyle = color;
    ctx.lineWidth = Math.max(0.5, scale * 0.2);
    ctx.beginPath();

    if (e.type === 'LINE') {
      const a = toScreen(e.x, e.y), b = toScreen(e.x2, e.y2);
      ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
    } else if (e.type === 'CIRCLE') {
      const c = toScreen(e.x, e.y);
      ctx.arc(c.x, c.y, e.r * scale, 0, Math.PI * 2); ctx.stroke();
    } else if (e.type === 'ARC') {
      const c = toScreen(e.x, e.y);
      ctx.arc(c.x, c.y, e.r * scale, -(e.startAngle * Math.PI / 180), -(e.endAngle * Math.PI / 180), true);
      ctx.stroke();
    } else if (e.type === 'POINT') {
      const p = toScreen(e.x, e.y); ctx.arc(p.x, p.y, 2, 0, Math.PI * 2); ctx.fill();
    } else if ((e.type === 'LWPOLYLINE' || e.type === 'POLYLINE') && e.pts) {
      if (e.pts.length < 2) return;
      const p0 = toScreen(e.pts[0].x, e.pts[0].y); ctx.moveTo(p0.x, p0.y);
      for (let j = 1; j < e.pts.length; j++) { const p = toScreen(e.pts[j].x, e.pts[j].y); ctx.lineTo(p.x, p.y); }
      if (e.flags & 1) ctx.closePath(); ctx.stroke();
    } else if (e.type === 'ELLIPSE') {
      const c = toScreen(e.x, e.y);
      ctx.ellipse(c.x, c.y, e.r * scale, e.r * (e.xScale || 1) * scale, 0, 0, Math.PI * 2); ctx.stroke();
    } else if ((e.type === 'TEXT' || e.type === 'MTEXT') && e.text) {
      const p = toScreen(e.x, e.y);
      ctx.font = `${Math.max(8, (e.r || 2.5) * scale)}px Consolas, monospace`;
      ctx.fillStyle = color; ctx.fillText(e.text, p.x, p.y);
    }
  });
}

function drawPreview(data, dark) {
  const canvas = document.getElementById('previewCanvas');
  canvas.width = 800; canvas.height = 600;
  canvas.style.display = 'block';
  document.getElementById('previewEmpty').style.display = 'none';
  drawOnCanvas(canvas, data, dark ? '#0d0d1a' : '#ffffff', !dark);
}

// ─── 변환 ──────────────────────────────────────────────────────────────────
function convert() {
  if (!parsedData) return;
  document.getElementById('progress').classList.add('show');
  document.getElementById('convertBtn').disabled = true;
  document.getElementById('resultBar').classList.remove('show');

  setTimeout(() => {
    try {
      if (selectedFmt === 'png') convertPNG();
      else convertSVG();
    } finally {
      document.getElementById('progress').classList.remove('show');
      document.getElementById('convertBtn').disabled = false;
    }
  }, 50);
}

function convertPNG() {
  const canvas = document.createElement('canvas');
  canvas.width = 2048; canvas.height = 2048;
  drawOnCanvas(canvas, parsedData, '#ffffff', true);
  canvas.toBlob(blob => {
    convertedBlob = blob;
    convertedExt = 'png';
    const url = URL.createObjectURL(blob);
    const previewCanvas = document.getElementById('previewCanvas');
    previewCanvas.width = 800; previewCanvas.height = 600;
    previewCanvas.style.display = 'block';
    document.getElementById('previewEmpty').style.display = 'none';
    const pctx = previewCanvas.getContext('2d');
    const img = new Image();
    img.onload = () => {
      pctx.drawImage(img, 0, 0, 800, 600);
      URL.revokeObjectURL(url);
    };
    img.src = url;
    showResult('PNG 2048×2048px — 흰 배경', url, `${currentFileName}.png`);
  }, 'image/png');
}

function convertSVG() {
  const entities = parsedData.entities;
  const layers = parsedData.layers;
  const bounds = calcBounds(entities);
  const bw = bounds.maxX - bounds.minX || 1;
  const bh = bounds.maxY - bounds.minY || 1;
  const pad = 20;

  function tx(wx) { return ((wx - bounds.minX) + pad / 2).toFixed(4); }
  function ty(wy) { return (bh - (wy - bounds.minY) + pad / 2).toFixed(4); }

  let svgParts = [];
  entities.forEach(e => {
    const layerDef = layers[e.layer] || {};
    const color = dxfColor(e.colorIndex, layerDef.color);
    const stroke = `stroke="${color}" fill="none" stroke-width="0.3"`;

    if (e.type === 'LINE') {
      svgParts.push(`<line x1="${tx(e.x)}" y1="${ty(e.y)}" x2="${tx(e.x2)}" y2="${ty(e.y2)}" ${stroke}/>`);
    } else if (e.type === 'CIRCLE') {
      svgParts.push(`<circle cx="${tx(e.x)}" cy="${ty(e.y)}" r="${e.r.toFixed(4)}" ${stroke}/>`);
    } else if (e.type === 'ARC') {
      const sa = e.startAngle * Math.PI / 180;
      const ea = e.endAngle * Math.PI / 180;
      const x1 = (e.x + e.r * Math.cos(sa) - bounds.minX + pad / 2).toFixed(4);
      const y1 = (bh - (e.y + e.r * Math.sin(sa) - bounds.minY) + pad / 2).toFixed(4);
      const x2 = (e.x + e.r * Math.cos(ea) - bounds.minX + pad / 2).toFixed(4);
      const y2 = (bh - (e.y + e.r * Math.sin(ea) - bounds.minY) + pad / 2).toFixed(4);
      const large = (e.endAngle - e.startAngle + 360) % 360 > 180 ? 1 : 0;
      svgParts.push(`<path d="M${x1},${y1} A${e.r.toFixed(4)},${e.r.toFixed(4)} 0 ${large},0 ${x2},${y2}" ${stroke}/>`);
    } else if (e.type === 'POINT') {
      svgParts.push(`<circle cx="${tx(e.x)}" cy="${ty(e.y)}" r="0.5" fill="${color}"/>`);
    } else if ((e.type === 'LWPOLYLINE' || e.type === 'POLYLINE') && e.pts?.length >= 2) {
      const pts = e.pts.map(p => `${tx(p.x)},${ty(p.y)}`).join(' ');
      const closed = e.flags & 1 ? ' Z' : '';
      svgParts.push(`<polyline points="${pts}" ${stroke}${closed ? ' style="fill:none"' : ''}/>`);
    } else if ((e.type === 'TEXT' || e.type === 'MTEXT') && e.text) {
      svgParts.push(`<text x="${tx(e.x)}" y="${ty(e.y)}" font-size="2.5" fill="${color}" font-family="monospace">${e.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</text>`);
    }
  });

  const vw = (bw + pad).toFixed(2);
  const vh = (bh + pad).toFixed(2);
  const svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${vw} ${vh}" width="${vw}" height="${vh}" style="background:#fff">
${svgParts.join('\n')}
</svg>`;

  const blob = new Blob([svg], { type: 'image/svg+xml' });
  convertedBlob = blob;
  convertedExt = 'svg';
  const url = URL.createObjectURL(blob);

  const img = new Image();
  img.onload = () => {
    const pc = document.getElementById('previewCanvas');
    pc.width = 800; pc.height = 600; pc.style.display = 'block';
    document.getElementById('previewEmpty').style.display = 'none';
    const pctx = pc.getContext('2d');
    pctx.fillStyle = '#fff'; pctx.fillRect(0, 0, 800, 600);
    const ratio = Math.min(800 / img.width, 600 / img.height);
    const dw = img.width * ratio, dh = img.height * ratio;
    pctx.drawImage(img, (800 - dw) / 2, (600 - dh) / 2, dw, dh);
  };
  img.src = url;

  showResult(`SVG 벡터 — ${svgParts.length}개 요소`, url, `${currentFileName}.svg`);
}

function showResult(info, url, filename) {
  const bar = document.getElementById('resultBar');
  bar.classList.add('show');
  document.getElementById('resultInfo').textContent = info;
  const btn = document.getElementById('dlBtn');
  btn.onclick = () => {
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
  };
}
</script>
</body>
</html>
